{% extends "base.html" %}

{% block analytics %}
<script defer src="https://cloud.umami.is/script.js" data-website-id="3f7d5528-cf78-4a9c-96f3-d43359830c45"></script>
{{ super() }}
{% endblock %}

{% block extrahead %}
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Ahmed's Notebook" />
{% if page and page.canonical_url %}
<meta property="og:url" content="{{ page.canonical_url }}" />
{% endif %}
<meta property="og:title" content="{% if page and page.title %}{{ page.title }} - {% endif %}Ahmed's Notebook" />
<meta property="og:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Practical guides and notes on Linux system administration, GPFS, storage solutions, and IT infrastructure.{% endif %}" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="{% if page and page.title %}{{ page.title }} - {% endif %}Ahmed's Notebook" />
<meta name="twitter:description" content="{% if page and page.meta and page.meta.description %}{{ page.meta.description }}{% else %}Practical guides and notes on Linux system administration, GPFS, storage solutions, and IT infrastructure.{% endif %}" />
{% endblock %}

<!-- ------------------------------------------------------------------------ -->
<!-- Custom content -->
{% block content %}

<script>
  function printPage() {
    window.print();
  }
</script>

<style>
  body {
    background-image: url('../../../overrides/traveler.png');
    background-size: 20%;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: right bottom;

    /* Ensure text is readable */
  }
</style>


<!-- Inline print icon within content -->
<div class="print-icon" onclick="printPage()" aria-label="Print Page">
  <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px">
    <path d="M0 0h24v24H0z" fill="none" />
    <path
      d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z" />
  </svg>
</div>

{{ super() }}
{% endblock %}
