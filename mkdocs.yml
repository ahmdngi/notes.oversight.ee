  - Cybersecurity:
      #- OSINT: content/cybersecurity/osint.md
      - Maritime OSINT Tools:
          - Vessels and Ports: content/cybersecurity/maritime_osint/vessel_and_port_tracking.md
          - Administrative and Regulatory: content/cybersecurity/maritime_osint/administrative_regulatory_intelligence.md
          - Personnel Profiling: content/cybersecurity/maritime_osint/personnel_profiling.md
          - Geospatial and Env. Analysis: content/cybersecurity/maritime_osint/geospatial_environmental_analysis.md
          - Digital Infrastructure Recon: content/cybersecurity/maritime_osint/digital_infrastructure_reconnaissance.md
